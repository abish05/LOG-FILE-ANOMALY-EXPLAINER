name: LogSage AI CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest (Ollama mocked)
        run: pytest tests/ -v --tb=short

      - name: Check import health
        run: |
          python -c "from parser.log_parser import parse_log_file; print('parser OK')"
          python -c "from agent.analyzer import run_agent_loop; print('agent OK')"
          python -c "from database.db import init_db; print('db OK')"
          python -c "from reports.report_generator import generate_pdf; print('reports OK')"

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t logsage-ai:${{ github.sha }} .

      - name: Test Docker image starts
        run: |
          docker run -d --name test-logsage \
            -e OLLAMA_HOST=http://localhost:11434 \
            -e DB_PATH=/tmp/logsage.db \
            -p 8501:8501 \
            logsage-ai:${{ github.sha }}
          sleep 15
          curl -f http://localhost:8501/_stcore/health || exit 1
          docker stop test-logsage

  deploy-vps:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/logsage-ai
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt
            sudo systemctl restart logsage
            sleep 5
            sudo systemctl is-active --quiet logsage && echo "Deploy successful" || exit 1
