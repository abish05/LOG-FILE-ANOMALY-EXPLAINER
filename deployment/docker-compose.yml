version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: logsage_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  ollama-setup:
    image: ollama/ollama:latest
    container_name: logsage_ollama_setup
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "ollama pull llama3 && echo 'Model ready'"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  logsage:
    build: .
    container_name: logsage_app
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./sample_logs:/app/sample_logs
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - DB_PATH=/app/data/logsage.db
      - MODEL_NAME=llama3
    depends_on:
      ollama:
        condition: service_healthy
      ollama-setup:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

volumes:
  ollama_data:
